services:
  api:
    build:
      context: .
      dockerfile: src/Luthn.Host.Api/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__LuthnDb: ${LUTHN_DOCKER_CONNECTION_STRING:-Host=postgres;Port=5432;Database=luthn;Username=luthn}
      Luthn__Classification__Provider: ${Luthn__Classification__Provider:-unconfigured}
      Luthn__Classification__AllowMock: ${Luthn__Classification__AllowMock:-false}
      Luthn__Database__EnableRetries: ${Luthn__Database__EnableRetries:-true}
      Luthn__Database__MaxRetryCount: ${Luthn__Database__MaxRetryCount:-5}
      Luthn__Database__MaxRetryDelaySeconds: ${Luthn__Database__MaxRetryDelaySeconds:-10}
      Luthn__OperatorConfig__Directory: ${Luthn__OperatorConfig__Directory:-/var/lib/luthn/operator}
      Luthn__Host__RequestTimeoutSeconds: ${Luthn__Host__RequestTimeoutSeconds:-65}
      Luthn__Auth__RequireServiceToken: ${Luthn__Auth__RequireServiceToken:-true}
      Luthn__Auth__Tokens__0__Name: ${Luthn__Auth__Tokens__0__Name:-local-agent}
      Luthn__Auth__Tokens__0__Sha256Digest: ${Luthn__Auth__Tokens__0__Sha256Digest:-}
      Luthn__Auth__Tokens__0__Scopes__0: ${Luthn__Auth__Tokens__0__Scopes__0:-agent.read}
      Luthn__Auth__Tokens__0__Scopes__1: ${Luthn__Auth__Tokens__0__Scopes__1:-agent.write.summary}
      Luthn__Auth__Tokens__0__Scopes__2: ${Luthn__Auth__Tokens__0__Scopes__2:-memory.write}
      Luthn__Auth__Tokens__0__Scopes__3: ${Luthn__Auth__Tokens__0__Scopes__3:-memory.read}
      Luthn__Auth__Tokens__0__Scopes__4: ${Luthn__Auth__Tokens__0__Scopes__4:-classification.preview}
      Luthn__Auth__Tokens__0__Scopes__5: ${Luthn__Auth__Tokens__0__Scopes__5:-agent.connection.read}
      Luthn__Auth__Tokens__0__Scopes__6: ${Luthn__Auth__Tokens__0__Scopes__6:-agent.connection.write}
      Luthn__Auth__Tokens__0__Scopes__7: ${Luthn__Auth__Tokens__0__Scopes__7:-external-publication.read}
      Luthn__Auth__Tokens__0__Scopes__8: ${Luthn__Auth__Tokens__0__Scopes__8:-external-publication.write}
      Luthn__Auth__Tokens__0__Scopes__9: ${Luthn__Auth__Tokens__0__Scopes__9:-metrics.read}
      Luthn__Auth__Tokens__0__Scopes__10: ${Luthn__Auth__Tokens__0__Scopes__10:-access.request}
      Luthn__Auth__Tokens__0__Scopes__11: ${Luthn__Auth__Tokens__0__Scopes__11:-}
      Luthn__Auth__Tokens__0__Scopes__12: ${Luthn__Auth__Tokens__0__Scopes__12:-}
      Luthn__Auth__Tokens__0__Scopes__13: ${Luthn__Auth__Tokens__0__Scopes__13:-}
      Luthn__Auth__Tokens__0__Scopes__14: ${Luthn__Auth__Tokens__0__Scopes__14:-}
      Luthn__Auth__Tokens__0__Scopes__15: ${Luthn__Auth__Tokens__0__Scopes__15:-}
      Luthn__Auth__Tokens__1__Name: ${Luthn__Auth__Tokens__1__Name:-local-operator}
      Luthn__Auth__Tokens__1__Sha256Digest: ${Luthn__Auth__Tokens__1__Sha256Digest:-}
      Luthn__Auth__Tokens__1__Scopes__0: ${Luthn__Auth__Tokens__1__Scopes__0:-access.decide}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - luthn-operator:/var/lib/luthn/operator

  worker:
    profiles: ["sync-worker"]
    build:
      context: .
      dockerfile: src/Luthn.Host.Api/Dockerfile
    command: ["worker"]
    environment:
      ConnectionStrings__LuthnDb: ${LUTHN_DOCKER_CONNECTION_STRING:-Host=postgres;Port=5432;Database=luthn;Username=luthn}
      Luthn__Database__EnableRetries: ${Luthn__Database__EnableRetries:-true}
      Luthn__Database__MaxRetryCount: ${Luthn__Database__MaxRetryCount:-5}
      Luthn__Database__MaxRetryDelaySeconds: ${Luthn__Database__MaxRetryDelaySeconds:-10}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-luthn}
      POSTGRES_USER: ${POSTGRES_USER:-luthn}
      POSTGRES_HOST_AUTH_METHOD: ${POSTGRES_HOST_AUTH_METHOD:-trust}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - luthn-postgres:/var/lib/postgresql

volumes:
  luthn-operator:
  luthn-postgres:
