name: Publish container

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-container-main
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/jakobsung/luthn

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main
            type=sha,format=long,prefix=sha-
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=AGPL-3.0-only
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and publish multi-architecture image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Luthn.Host.Api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify published manifest
        run: |
          docker buildx imagetools inspect "${IMAGE_NAME}:main"
          docker buildx imagetools inspect "${IMAGE_NAME}:sha-${GITHUB_SHA}"

      - name: Verify anonymous public pull
        run: |
          docker logout ghcr.io
          if ! token_response="$(curl -fsSL "https://ghcr.io/token?scope=repository:jakobsung/luthn:pull")"; then
            echo "::error::GHCR denied anonymous access. Set the luthn package visibility to Public in GitHub package settings, then re-run this workflow."
            exit 1
          fi
          token="$(printf '%s' "$token_response" \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["token"])')"
          if ! curl -fsSI \
            -H "Authorization: Bearer ${token}" \
            -H "Accept: application/vnd.oci.image.index.v1+json" \
            "https://ghcr.io/v2/jakobsung/luthn/manifests/sha-${GITHUB_SHA}"; then
            echo "::error::The published image is not anonymously pullable. Set the GHCR package visibility to Public and re-run this workflow."
            exit 1
          fi
